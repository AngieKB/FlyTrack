spring.application.name=devops

# Desactiva Docker Compose ? usamos MySQL local
#spring.docker.compose.enabled=false

# MySQL local en puerto 3306
spring.datasource.url=jdbc:mysql://localhost:3306/flytrack_db
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Puerto
server.port=8080

# Security
spring.security.user.name=admin
spring.security.user.password=admin123

spring.docker.compose.file=backend/compose.yaml