spring.application.name=devops

# MySQL - Entorno de Producción
# Usa variables de entorno del servidor. Si no las encuentra, usa los valores por defecto (después de los dos puntos)
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql-prod}:${DB_PORT:3306}/${DB_NAME:flytrack_db}
spring.datasource.username=${DB_USER:flytrack}
spring.datasource.password=${DB_PASSWORD:flytrack123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA (La regla de oro de Producción: NUNCA alterar tablas, solo validar)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Puerto
server.port=8080

# Security (Las credenciales REALES se inyectan desde el servidor, no se queman aquí)
spring.security.user.name=${SECURITY_USER}
spring.security.user.password=${SECURITY_PASSWORD}

# Actuator para health checks (Para que Kubernetes o Docker Swarm sepan que la app está viva)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Logging en producción (Solo información esencial para no llenar el disco duro del servidor)
logging.level.root=INFO
logging.level.co.uniquindio.software=INFO