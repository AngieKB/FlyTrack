name: CI/CD Pipeline - FlyTrack

on:
  push:
    branches:
      - tests
      - main
      - despliegue
  pull_request:
    branches:
      - tests
      - main
      - despliegue

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # ETAPA 1: Compilación
  # ============================================
  build:
    runs-on: ubuntu-latest
    name: Build & Compile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./backend/gradlew

      - name: Compile project
        run: |
          cd backend
          ./gradlew clean compileJava --no-daemon

      - name: Build project
        run: |
          cd backend
          ./gradlew build -x test --no-daemon

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: backend/build/libs/

  # ============================================
  # ETAPA 2: Pruebas Automatizadas (JUnit)
  # ============================================
  test:
    runs-on: ubuntu-latest
    name: Automated Tests (JUnit)
    needs: build
    permissions:
      contents: read
      checks: write
      pull-requests: read

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: flytrack_db
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot123"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=5
        ports:
          - 3306:3306

    env:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/flytrack_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./backend/gradlew

      - name: Wait for MySQL to be ready
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y netcat-openbsd > /dev/null 2>&1
          
          echo "Waiting for MySQL to be ready..."
          for i in {1..60}; do
            if nc -z localhost 3306 > /dev/null 2>&1; then
              echo "✅ MySQL is ready on port 3306"
              sleep 2
              break
            fi
            echo "Waiting for MySQL... ($i/60)"
            sleep 1
          done
          

          # Verify connection
          if ! nc -z localhost 3306; then
            echo "❌ MySQL failed to start - port not responding"
            exit 1
          fi

      - name: Run tests
        run: |
          cd backend
          ./gradlew test --no-daemon -Dspring.profiles.active=test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/build/test-results/

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          name: Test Results
          path: 'backend/build/test-results/**/*.xml'
          reporter: 'java-junit'

  # ============================================
  # ETAPA 3: Análisis de Calidad de Código (SonarCloud)
  # ============================================
  quality-analysis:
    runs-on: ubuntu-latest
    name: Code Quality Analysis (SonarCloud)
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./backend/gradlew

      - name: Build for analysis
        run: |
          cd backend
          ./gradlew build -x test --no-daemon

      - name: Run SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd backend
          ./gradlew sonar \
            -Dsonar.projectKey=angie_FlyTrack \
            -Dsonar.organization=angiekb \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml \
            --no-daemon

  # ============================================
  # ETAPA 4: Build de imagen Docker Backend
  # ============================================
  docker-build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: [test, quality-analysis]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # ETAPA 4B: Build imagen Docker Frontend
  # ============================================
  docker-build-frontend:
    runs-on: ubuntu-latest
    name: Build Frontend Docker Image
    needs: [test, quality-analysis]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set repository name lowercase
        id: repo
        run: echo "name=$(echo ghcr.io/${{ github.repository }}-frontend | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          build-args: |
            BUILD_ENV=${{ (github.ref == 'refs/heads/main') && 'production' || 'staging' }}
          tags: ${{ steps.repo.outputs.name }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # ETAPA 5: Despliegue a STAGING
  # ============================================
  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy to Staging (EC2)
    needs: [docker-build, docker-build-frontend]
    if: (github.ref == 'refs/heads/tests' || github.ref == 'refs/heads/despliegue') && github.event_name == 'push'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd /home/ec2-user/flytrack

            export APP_IMAGE=ghcr.io/${{ github.repository }}:tests
            export DB_PASSWORD=flytrack123
            export DB_ROOT_PASSWORD=admin123
            export DB_NAME=flytrack_db
            export DB_USER=flytrack

            docker-compose -f docker-compose.staging.yml pull
            docker-compose -f docker-compose.staging.yml down --remove-orphans
            docker-compose -f docker-compose.staging.yml up -d

            sleep 15
            docker-compose -f docker-compose.staging.yml ps

      - name: Notify Staging Deployment
        run: |
          echo "✅ Staging desplegado exitosamente"
          echo "🌐 Backend: http://${{ secrets.EC2_HOST }}:8080"
          echo "🌐 Frontend: http://${{ secrets.EC2_HOST }}:4200"
          echo "👤 Autor: ${{ github.actor }}"

  # ============================================
  # ETAPA 6: Despliegue a PRODUCCIÓN
  # ============================================
  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production (EC2)
    needs: [docker-build, docker-build-frontend]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/despliegue') && github.event_name == 'push'

    environment:
      name: production
      url: http://3.139.89.99:8080

    steps:
      - name: Deploy to Production EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd /home/ec2-user/flytrack

            export DB_PASSWORD=flytrack123
            export DB_ROOT_PASSWORD=admin123
            export DB_NAME=flytrack_db
            export DB_USER=flytrack

            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml down --remove-orphans
            docker-compose -f docker-compose.prod.yml up -d

            sleep 15
            docker-compose -f docker-compose.prod.yml ps

      - name: Notify Production Deployment
        run: |
          echo "✅ Producción desplegada exitosamente"
          echo "🌐 Backend: http://3.139.89.99:8080"
          echo "🌐 Frontend: http://3.139.89.99:4200"
          echo "👤 Autor: ${{ github.actor }}"
          echo "🔖 Commit: ${{ github.sha }}"

  # ============================================
  # NOTIFICACIONES --Otro intento--
  # ============================================
  notify-failure:
    runs-on: ubuntu-latest
    name: Notify on Failure
    if: failure()
    needs: [build, test, quality-analysis, docker-build, docker-build-frontend]

    steps:
      - name: Send failure notification
        run: |
          echo "El pipeline ha fallado"
          echo "Workflow: ${{ github.workflow }}"
          echo "Rama: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"