name: CI/CD Pipeline - FlyTrack

on:
  push:
    branches:
      - tests
      - main
      - despliegue
  pull_request:
    branches:
      - tests
      - main
      - despliegue

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # ETAPA 1: Compilación
  # ============================================
  build:
    runs-on: ubuntu-latest
    name: Build & Compile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compile project
        run: ./gradlew :backend:compileJava --no-daemon

      - name: Build project
        run: ./gradlew :backend:build -x test --no-daemon

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: backend/build/libs/

  # ============================================
  # ETAPA 2: Pruebas Automatizadas (JUnit)
  # ============================================
  test:
    runs-on: ubuntu-latest
    name: Automated Tests (JUnit)
    needs: build
    permissions:
      contents: read
      checks: write
      pull-requests: read

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: flytrack_db
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot123"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=5
        ports:
          - 3306:3306

    env:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/flytrack_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Wait for MySQL to be ready
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y netcat-openbsd > /dev/null 2>&1

          echo "Waiting for MySQL to be ready..."
          for i in {1..60}; do
            if nc -z localhost 3306 > /dev/null 2>&1; then
              echo "✅ MySQL is ready on port 3306"
              sleep 2
              break
            fi
            echo "Waiting for MySQL... ($i/60)"
            sleep 1
          done

          if ! nc -z localhost 3306; then
            echo "❌ MySQL failed to start - port not responding"
            exit 1
          fi

      - name: Run tests
        run: ./gradlew :backend:test --no-daemon -Dspring.profiles.active=test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/build/test-results/

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        with:
          name: Test Results
          path: 'backend/build/test-results/**/*.xml'
          reporter: 'java-junit'

  # ============================================
  # ETAPA 3: Análisis de Calidad de Código (SonarCloud)
  # ============================================
  quality-analysis:
    runs-on: ubuntu-latest
    name: Code Quality Analysis (SonarCloud)
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build for analysis
        run: ./gradlew :backend:build -x test --no-daemon

      - name: Run SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew :backend:sonar \
            -Dsonar.projectKey=angie_FlyTrack \
            -Dsonar.organization=angiekb \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=backend/build/reports/jacoco/test/jacocoTestReport.xml \
            --no-daemon

  # ============================================
  # ETAPA 4: Build de imagen Docker Backend
  # ============================================
  docker-build:
    runs-on: ubuntu-latest
    name: Build Docker Image (Backend)
    needs: [test, quality-analysis]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set repository name lowercase
        id: repo
        run: echo "name=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.repo.outputs.name }}:${{ github.ref_name }}
            ${{ steps.repo.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # ETAPA 4B: Build imagen Docker Frontend
  # ============================================
  docker-build-frontend:
    runs-on: ubuntu-latest
    name: Build Docker Image (Frontend)
    needs: [test, quality-analysis]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set repository name lowercase
        id: repo
        run: echo "name=$(echo ghcr.io/${{ github.repository }}-frontend | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # Paso clave: determinar BUILD_ENV y API_URL según la rama
      # Se hace en un paso separado con if/elif para evitar ternarias anidadas
      # que causan que las IPs se confundan entre staging y prod
      - name: Determine build environment and API URL
        id: build_args
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "build_env=production" >> $GITHUB_OUTPUT
            echo "api_url=http://${{ secrets.EC2_HOST_PROD }}:8080/api" >> $GITHUB_OUTPUT
            echo "image_tag=main" >> $GITHUB_OUTPUT
            echo "🏭 Entorno: PRODUCCIÓN"
            echo "🌐 API URL: http://${{ secrets.EC2_HOST_PROD }}:8080/api"
          elif [[ "${{ github.ref }}" == "refs/heads/despliegue" ]]; then
            echo "build_env=staging" >> $GITHUB_OUTPUT
            echo "api_url=http://${{ secrets.EC2_HOST }}:8080/api" >> $GITHUB_OUTPUT
            echo "image_tag=despliegue" >> $GITHUB_OUTPUT
            echo "🧪 Entorno: STAGING"
            echo "🌐 API URL: http://${{ secrets.EC2_HOST }}:8080/api"
          else
            echo "build_env=staging" >> $GITHUB_OUTPUT
            echo "api_url=http://${{ secrets.EC2_HOST }}:8080/api" >> $GITHUB_OUTPUT
            echo "image_tag=tests" >> $GITHUB_OUTPUT
            echo "🧪 Entorno: STAGING (rama tests)"
            echo "🌐 API URL: http://${{ secrets.EC2_HOST }}:8080/api"
          fi

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          build-args: |
            BUILD_ENV=${{ steps.build_args.outputs.build_env }}
            API_URL=${{ steps.build_args.outputs.api_url }}
          tags: |
            ${{ steps.repo.outputs.name }}:${{ steps.build_args.outputs.image_tag }}
            ${{ steps.repo.outputs.name }}:latest
          # Sin cache para el frontend para evitar que quede una IP vieja cacheada
          no-cache: true

  # ============================================
  # ETAPA 5: Despliegue a STAGING
  # ============================================
  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy to Staging (EC2)
    needs: [docker-build, docker-build-frontend]
    if: (github.ref == 'refs/heads/tests' || github.ref == 'refs/heads/despliegue') && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.staging.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.staging.yml"
          target: "/home/ec2-user/flytrack/"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          script: |
            # Login en GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull con el tag exacto de la rama
            BRANCH_TAG="${{ github.ref_name }}"
            echo "📦 Descargando imágenes con tag: ${BRANCH_TAG}"
            docker pull ghcr.io/angiekb/flytrack:${BRANCH_TAG} &
            docker pull ghcr.io/angiekb/flytrack-frontend:${BRANCH_TAG} &
            wait
            echo "✅ Imágenes descargadas"

            cd /home/ec2-user/flytrack

            docker-compose -f docker-compose.staging.yml down --remove-orphans
            docker-compose -f docker-compose.staging.yml up -d

            # Esperar que el backend esté listo (hasta 2 minutos)
            echo "⏳ Esperando que el backend esté listo..."
            for i in {1..24}; do
              if wget --quiet --tries=1 --spider http://localhost:8080/actuator/health 2>/dev/null; then
                echo "✅ Backend listo"
                break
              fi
              echo "Esperando backend... ($i/24)"
              sleep 5
            done

            docker-compose -f docker-compose.staging.yml ps

      - name: Notify Staging Deployment
        run: |
          echo "✅ Staging desplegado exitosamente"
          echo "🌐 Backend:  http://${{ secrets.EC2_HOST }}:8080"
          echo "🌐 Frontend: http://${{ secrets.EC2_HOST }}:4200"
          echo "👤 Autor: ${{ github.actor }}"
          echo "🔖 Rama: ${{ github.ref_name }}"
          echo "🔖 Commit: ${{ github.sha }}"

